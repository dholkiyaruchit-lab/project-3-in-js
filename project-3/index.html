<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Array Operations</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Array Operations</h1>

    <input type="number" id="size" placeholder="Enter Array Size" />
    <button onclick="createInputs()">Create Inputs</button>

    <div id="inputs"></div>

    <button onclick="createArray()">Create Array</button>

    <h3>Array :</h3>
    <p id="arrayDisplay">[]</p>

    <div class="buttons">
      <button onclick="showLength()">Length</button>
      <button onclick="sortArray()">Sort</button>
      <button onclick="reverseArray()">Reverse</button>
      <button onclick="maximum()">Maximum</button>
      <button onclick="minimum()">Minimum</button>

      <button onclick="sum()">Sum</button>
      <button onclick="average()">Average</button>
      <button onclick="pushValue()">Push</button>
      <button onclick="popValue()">Pop</button>

      <button onclick="shiftValue()">Shift</button>
      <button onclick="unshiftValue()">Unshift</button>
      <button onclick="sliceArray()">Slice</button>
      <button onclick="spliceArray()">Splice</button>

      <button onclick="joinArray()">Join</button>
      <button onclick="concatArray()">Concat</button>
      <button onclick="indexOfValue()">Index Of</button>
      <button onclick="includesValue()">Includes</button>

      <button onclick="findValue()">Find</button>
      <button onclick="findIndexValue()">Find Index</button>
      <button onclick="mapArray()">Map ×2</button>
      <button onclick="filterEven()">Filter Even</button>

      <button onclick="filterOdd()">Filter Odd</button>
      <button onclick="reduceArray()">Reduce</button>
    </div>

    <h2 id="result"></h2>

    <script src="script.js"></script>
  </body>
</html>
